name: Deploy to WordPress.org
on:
  push:
    tags:
    - "[0-9]+.[0-9]+.[0-9]+.[0-9]+"

env:
  plugin_name: vk-all-in-one-expansion-unit

jobs:
  plugin-deploy:
    name: Deploy to Wordpress.org plugin directory
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - uses: actions/setup-node@v1
      with:
          node-version: 20.x
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
          php-version: 8.1
    - name: install npm scripts
      run: npm install
    - name: install Composer Package
      run: composer install
    - name: Install WP-CLI
      run: |
        curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
        chmod +x wp-cli.phar
        mv wp-cli.phar /usr/local/bin/wp
    - name: npm Build
      run: npm run build
    - name: Make Distribution
      run: npm run dist:org
      if: contains(github.ref, 'tags/')
    - name: WordPress Plugin Deploy
      uses: 10up/action-wordpress-plugin-deploy@master
      env:
        SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        SLUG: vk-all-in-one-expansion-unit

  release:
    name: Release to GitHub
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - uses: actions/setup-node@v1
      with:
          node-version: 20.15.0
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
          php-version: 8.1
    - name: install npm scripts
      run: npm install
    - name: install Composer Package
      run: composer install
    - name: Install WP-CLI
      run: |
        curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
        chmod +x wp-cli.phar
        mv wp-cli.phar /usr/local/bin/wp
    - name: npm Build
      run: npm run build
    - name: Make Distribution
      run: |
        npm run dist:github
        cd dist/ && zip -r ${{ env.plugin_name }}.zip ${{ env.plugin_name }}/
    - run: test -e dist/${{ env.plugin_name }}.zip
    - name: Find previous stable tag
      id: prev_tag
      # *.*.*.1（安定版）タグのときのみ実行
      # *.*.*.0 が存在する状態でリリースノートを生成すると直前タグが .0 になり差分が空になるため、
      # 直前の *.*.*.1 タグを明示的に指定する
      if: endsWith(github.ref_name, '.1')
      run: |
        git fetch --tags
        PREV=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.1$' | sed -n '2p')
        echo "tag=${PREV}" >> $GITHUB_OUTPUT
    - name: Create Release
      # gh release create CLI を使用:
      # *.*.*.1（安定版）: --generate-notes + --notes-start-tag で直前の .1 タグからの PR 差分を生成
      # *.*.*.0（ベータ）: --prerelease のみ（ノートなし）
      run: |
        TAG="${{ github.ref_name }}"
        ASSET="dist/${{ env.plugin_name }}.zip"
        if [[ "$TAG" == *.1 ]]; then
          PREV="${{ steps.prev_tag.outputs.tag }}"
          if [ -n "$PREV" ]; then
            gh release create "$TAG" "$ASSET" --generate-notes --notes-start-tag "$PREV"
          else
            gh release create "$TAG" "$ASSET" --generate-notes
          fi
        else
          gh release create "$TAG" "$ASSET" --prerelease
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

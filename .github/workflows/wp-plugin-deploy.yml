name: Deploy to WordPress.org
on:
    push:
        tags:
            - '[0-9]+.[0-9]+.[0-9]+'
env:
    plugin_name: vk-all-in-one-expansion-unit
jobs:
    smoke_test:
        name: Smoke Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.1
            - name: Install NPM Scripts
              run: npm install
            - name: Create dist
              run: npm run dist
            - name: Setup wp-env override for dist
              run: |
                  echo '{"plugins":["./dist/${{ env.plugin_name }}"]}' > wp-env.override.json
            - name: Start wp-env
              run: npx wp-env start
            - name: Smoke test
              # vektor-inc/wp-actions main as of 2026-03-18
              uses: vektor-inc/wp-actions/smoke-test@90f5a231bc956543bf235f36be4928d57af2edab
    php_unit:
        name: PHP Unit Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.1
            - name: Install NPM Scripts
              run: npm install
            - name: Install Composer Packages
              run: composer install
            - name: Build
              run: npm run build
            - name: Start wp-env
              run: npx wp-env start
            - name: Run PHP Unit Test
              run: npm run phpunit
    deploy:
        name: Deploy to WordPress.org
        runs-on: ubuntu-latest
        needs: [smoke_test, php_unit]
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.1
            - name: Install NPM Scripts
              run: npm install
            - name: Create dist
              run: npm run dist
            - name: WordPress Plugin Deploy
              # 10up/action-wordpress-plugin-deploy 2.3.0 / stable
              uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2
              env:
                  BUILD_DIR: dist/${{ env.plugin_name }}
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
    release:
        name: Release
        runs-on: ubuntu-latest
        needs: [smoke_test, php_unit]
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.1
            - name: Install NPM Scripts
              run: npm install
            - name: Create dist
              run: npm run dist
            - name: Create zip
              run: cd dist && zip -r ${{ env.plugin_name }}.zip ${{ env.plugin_name }}/
            - name: Create Release
              # softprops/action-gh-release v2.6.1 / v2
              uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
              with:
                  generate_release_notes: true
                  files: dist/${{ env.plugin_name }}.zip

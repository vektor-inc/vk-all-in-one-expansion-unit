name: Build Check & PHPUnit

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - master
      - develop
      - "feature/**"

jobs:
  php_unit:
    name: php unittest
    if: contains(github.event.pull_request.labels.*.name, 'run-ci')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [7.4, 8.0, 8.1]
    services:
      mysql:
        image: mysql:5.7
        ports:
          - 3306
        env:
          MYSQL_ROOT_PASSWORD: wordpress
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
    steps:
    - uses: actions/checkout@v2
    - name: Cache multiple paths
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
    - name: Setup PHP ${{ matrix.php }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
    - name: Setup Node
      uses: actions/setup-node@v1
      with:
        node-version: 20.x
    - name: install npm scripts
      run: npm install
    - name: install Composer Package
      # GitHub Actions の GITHUB_TOKEN が JWT 入りの ghs_*.*.* 形式に変更され、
      # Composer の OAuth トークン検証 (英数字 + アンダースコアのみ許可) を通らず
      # "invalid characters" で失敗するため、auth.json から該当エントリを除去してから install する。
      run: |
        composer config --global --unset github-oauth.github.com || true
        composer install
    - name: Install WP-CLI
      run: |
        curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
        chmod +x wp-cli.phar
        mv wp-cli.phar /usr/local/bin/wp
    - name: Build
      run: npm run build
    - name: Run Environment
      run: npx wp-env start
    - name: Run Environment
      run: npm run phpunit